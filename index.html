<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>后室 - Level 0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace;touch-action:none;user-select:none}
canvas{display:block;image-rendering:pixelated}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;color:#c9b458;transition:opacity .8s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:44px;letter-spacing:14px;margin-bottom:8px;text-shadow:0 0 30px rgba(201,180,88,.5)}
#overlay .sub{color:#555;font-size:11px;letter-spacing:4px;margin-bottom:32px}
#overlay p{color:#666;font-size:12px;margin-bottom:24px;text-align:center;line-height:2}
#overlay button{padding:14px 44px;border:1px solid rgba(201,180,88,.4);background:transparent;color:#c9b458;font-size:15px;cursor:pointer;letter-spacing:5px;font-family:inherit}
#hud{position:fixed;top:0;left:0;right:0;padding:10px 16px;z-index:10;display:none;justify-content:space-between;align-items:center;color:#c9b458;font-size:11px;pointer-events:none}
#hud.show{display:flex}
.bar{width:80px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.bf{height:100%;transition:width .2s}
#sf{background:#c9b458;width:100%}
#stf{background:#6a6;width:100%}
#msg{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(201,180,88,.7);font-size:12px;opacity:0;transition:opacity .5s;z-index:10;pointer-events:none;letter-spacing:2px}
#death{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;color:#c9b458}
#death h2{font-size:28px;letter-spacing:8px;margin-bottom:12px;font-weight:300}
#death p{color:#555;font-size:11px;margin-bottom:24px}
#death button{padding:10px 28px;border:1px solid rgba(201,180,88,.3);background:transparent;color:#c9b458;font-size:12px;cursor:pointer;font-family:inherit;letter-spacing:2px}
.jz{position:fixed;bottom:20px;z-index:20;display:none}
.jz.show{display:block}
#jl{left:20px}
#jr{right:20px}
.jb{width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.03);border:1px solid rgba(201,180,88,.15)}
.js{width:40px;height:40px;border-radius:50%;background:rgba(201,180,88,.2);position:relative;top:50%;left:50%;transform:translate(-50%,-50%)}
#rb{position:fixed;bottom:130px;left:40px;width:38px;height:38px;border-radius:50%;background:rgba(201,180,88,.05);border:1px solid rgba(201,180,88,.2);z-index:20;display:none;align-items:center;justify-content:center;color:rgba(201,180,88,.5);font-size:9px;font-family:inherit}
#rb.show{display:flex}
#rb.on{background:rgba(201,180,88,.2)}
</style>
</head>
<body>
<div id="overlay">
<h1>后 室</h1>
<div class="sub">LEVEL 0</div>
<p>电脑：WASD · 鼠标 · Shift跑<br>手机：双摇杆 · 跑按钮<br><br><span style="color:#383838">听到脚步声就跑。</span></p>
<button onclick="start()">进 入</button>
</div>
<div id="hud"><div style="display:flex;gap:10px;align-items:center"><span>LV.0</span><div class="bar"><div class="bf" id="sf"></div></div></div><div style="display:flex;gap:10px;align-items:center"><div class="bar"><div class="bf" id="stf"></div></div><span id="tm">00:00</span></div></div>
<div id="msg"></div>
<canvas id="c"></canvas>
<div class="jz" id="jl"><div class="jb"><div class="js" id="jsl"></div></div></div>
<div class="jz" id="jr"><div class="jb"><div class="js" id="jsr"></div></div></div>
<div id="rb">跑</div>
<div id="death"><h2>你被抓住了</h2><p>在后室中没人能听到你</p><button onclick="location.reload()">重来</button></div>
<script>
// ═══ RAYCASTING 3D ENGINE ═══
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,RES;
function resize(){W=innerWidth;H=innerHeight;RES=Math.max(1,Math.floor(W/(isMobile?160:320)));C.width=Math.floor(W/RES);C.height=Math.floor(H/RES);C.style.width=W+'px';C.style.height=H+'px'}
resize();addEventListener('resize',resize);

const isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)||('ontouchstart' in window);
const MAP_W=20,MAP_H=20,CELL=1;
const FOV=Math.PI*0.42;
let px=1.5,py=1.5,pa=0,pp=0;
let vx=0,vy=0;
let running=false,stamina=100,sanity=100;
let gameTime=0,started=false,dead=false,won=false;
let keys={},locked=false;
let entities=[],entTimer=0;
let map=[];
let lights=[];
let msgTO=null;

// Joystick
let jlx=0,jly=0,jrx=0,jry=0,jlt=null,jrt=null,jlo=null,jro=null;

// ═══ MAZE ═══
function genMaze(){
  const g=Array.from({length:MAP_H},()=>Array(MAP_W).fill(1));
  // Carve with recursive backtracker (2-cell steps)
  function carve(x,y){
    g[y][x]=0;
    const dirs=[[0,-2],[0,2],[-2,0],[2,0]].sort(()=>Math.random()-0.5);
    for(const[dx,dy]of dirs){
      const nx=x+dx,ny=y+dy;
      if(nx>0&&nx<MAP_W-1&&ny>0&&ny<MAP_H-1&&g[ny][nx]===1){
        g[y+dy/2][x+dx/2]=0;carve(nx,ny);
      }
    }
  }
  carve(1,1);
  // Extra openings for backrooms feel
  for(let i=0;i<MAP_W*MAP_H*0.08;i++){
    const x=1+Math.floor(Math.random()*(MAP_W-2)),y=1+Math.floor(Math.random()*(MAP_H-2));
    if(g[y][x]===1){let nb=0;if(y>0&&g[y-1][x]===0)nb++;if(y<MAP_H-1&&g[y+1][x]===0)nb++;if(x>0&&g[y][x-1]===0)nb++;if(x<MAP_W-1&&g[y][x+1]===0)nb++;if(nb>=2)g[y][x]=0}
  }
  map=g;
  // Lights at open spaces
  lights=[];
  for(let y=1;y<MAP_H-1;y+=2)for(let x=1;x<MAP_W-1;x+=2){
    if(g[y][x]===0)lights.push({x:x+0.5,y:y+0.5,intensity:0.7+Math.random()*0.5,flicker:Math.random()*0.01+0.003,on:true,t:Math.random()*100});
  }
}

// ═══ RAYCASTER ═══
function castRay(ox,oy,angle){
  const dx=Math.cos(angle),dy=Math.sin(angle);
  let t=0;const step=0.02;const maxD=20;
  while(t<maxD){
    t+=step;
    const cx=ox+dx*t,cy=oy+dy*t;
    const mx=Math.floor(cx),my=Math.floor(cy);
    if(mx<0||mx>=MAP_W||my<0||my>=MAP_H||map[my][mx]===1){
      return{dist:t,hitX:cx-Math.floor(cx),hitY:cy-Math.floor(cy),side:Math.abs(dx*(cy-oy-dy*t))<0.01?0:1};
    }
  }
  return{dist:maxD,hitX:0,hitY:0,side:0};
}

function getLighting(wx,wy,dist){
  let light=0.02; // ambient
  for(const l of lights){
    if(!l.on)continue;
    const d=Math.hypot(wx-l.x,wy-l.y);
    if(d<5)light+=l.intensity/(1+d*d*1.2);
  }
  // Distance fog
  light*=Math.max(0,1-dist/14);
  return Math.min(1,light);
}

function render(){
  const cw=C.width,ch=C.height;
  // Clear with very dark color
  X.fillStyle='#050403';X.fillRect(0,0,cw,ch);
  
  // Floor/ceiling gradient
  for(let y=Math.floor(ch/2);y<ch;y++){
    const depth=(y-ch/2)/(ch/2);
    const bright=Math.max(0,0.08-depth*0.04);
    const r=Math.floor(40*bright),g=Math.floor(30*bright),b=Math.floor(20*bright);
    X.fillStyle=`rgb(${r},${g},${b})`;
    X.fillRect(0,y,cw,1);
    // Ceiling mirror
    const cb=bright*0.8;
    const cr=Math.floor(180*cb),cg2=Math.floor(160*cb),cb2=Math.floor(120*cb);
    X.fillStyle=`rgb(${cr},${cg2},${cb2})`;
    X.fillRect(0,ch-1-y,cw,1);
  }

  // Walls via raycasting
  const halfFov=FOV/2;
  for(let col=0;col<cw;col++){
    const angle=pa+(col/cw-0.5)*FOV;
    const ray=castRay(px,py,angle);
    const corrDist=ray.dist*Math.cos(angle-pa); // fix fisheye
    const wallH=Math.min(ch*2,ch/(corrDist+0.001));
    const top=(ch-wallH)/2+pp*ch*0.3;
    
    // Wall hit point for texturing
    const hitPos=ray.side===0?ray.hitY:ray.hitX;
    
    // Lighting at hit point
    const wx=px+Math.cos(angle)*ray.dist,wy=py+Math.sin(angle)*ray.dist;
    const light=getLighting(wx,wy,corrDist);
    
    // Wall color (yellow wallpaper with variation)
    const baseR=185,baseG=148,baseB=40;
    // Texture pattern
    const texVar=Math.sin(hitPos*40)*0.05+Math.sin(hitPos*12)*0.08;
    const shade=ray.side===0?1:0.8; // side shading
    const l=light*shade;
    const r=Math.floor(Math.min(255,(baseR+texVar*60)*l));
    const g=Math.floor(Math.min(255,(baseG+texVar*40)*l));
    const b=Math.floor(Math.min(255,(baseB+texVar*20)*l));
    
    X.fillStyle=`rgb(${r},${g},${b})`;
    X.fillRect(col,top,1,wallH);
    
    // Dark top/bottom edges for depth
    const edgeH=wallH*0.1;
    X.fillStyle=`rgba(0,0,0,${0.3*l})`;
    X.fillRect(col,top,1,edgeH);
    X.fillRect(col,top+wallH-edgeH,1,edgeH);
  }

  // Light fixtures (billboard sprites)
  for(const l of lights){
    const dx=l.x-px,dy=l.y-py;
    const dist=Math.hypot(dx,dy);
    if(dist<0.3||dist>12)continue;
    const ang=Math.atan2(dy,dx);
    let diff=ang-pa;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    if(Math.abs(diff)>halfFov+0.1)continue;
    const screenX=(diff/FOV+0.5)*cw;
    const corrD=dist*Math.cos(ang-pa);
    const size=Math.min(cw*0.15,cw*0.3/corrD);
    if(l.on){
      const bright=Math.min(1,1.5/corrD);
      X.fillStyle=`rgba(255,240,180,${bright*0.9})`;
      X.fillRect(screenX-size/2,cw*0.12/corrD,size,size*0.3);
      // Glow
      const glow=size*2;
      const gr=X.createRadialGradient(screenX,cw*0.12/corrD,0,screenX,cw*0.12/corrD,glow);
      gr.addColorStop(0,`rgba(255,230,150,${bright*0.15})`);
      gr.addColorStop(1,'transparent');
      X.fillStyle=gr;X.fillRect(screenX-glow,cw*0.12/corrD-glow,glow*2,glow*2);
    }
  }

  // Entities
  for(const e of entities){
    const dx=e.x-px,dy=e.y-py,dist=Math.hypot(dx,dy);
    if(dist<0.3||dist>12)continue;
    const ang=Math.atan2(dy,dx);
    let diff=ang-pa;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    if(Math.abs(diff)>halfFov)continue;
    const screenX=(diff/FOV+0.5)*cw;
    const corrD=dist*Math.cos(ang-pa);
    const h=Math.min(ch,ch*0.8/corrD);
    const w=h*0.3;
    const top2=(ch-h)/2+pp*ch*0.3;
    const dark=Math.max(0,1-dist/8);
    X.fillStyle=`rgba(8,8,8,${dark*0.9})`;
    X.fillRect(screenX-w/2,top2,w,h);
    // Eyes
    if(dist<8){
      const eyeY=top2+h*0.25;
      const eyeS=Math.max(1,w*0.15);
      X.fillStyle=`rgba(255,20,0,${dark})`;
      X.beginPath();X.arc(screenX-w*0.15,eyeY,eyeS,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(screenX+w*0.15,eyeY,eyeS,0,Math.PI*2);X.fill();
    }
  }

  // Vignette
  const vg=X.createRadialGradient(cw/2,ch/2,ch*0.3,cw/2,ch/2,ch*0.7);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,0.6)');
  X.fillStyle=vg;X.fillRect(0,0,cw,ch);

  // Sanity effect
  if(sanity<30){
    X.fillStyle=`rgba(20,0,0,${(1-sanity/30)*0.15})`;X.fillRect(0,0,cw,ch);
  }
}

// ═══ ENTITY AI ═══
function spawnEnt(){
  let ex,ey;
  for(let i=0;i<100;i++){ex=1+Math.floor(Math.random()*(MAP_W-2))+0.5;ey=1+Math.floor(Math.random()*(MAP_H-2))+0.5;
    if(map[Math.floor(ey)][Math.floor(ex)]===0&&Math.hypot(ex-px,ey-py)>6)break}
  entities.push({x:ex,y:ey,speed:1.5+Math.random()*0.5});
}

function moveEnt(e,dt){
  const dx=px-e.x,dy=py-e.y,dist=Math.hypot(dx,dy);
  if(dist<0.35){dead=true;return}
  const a=Math.atan2(dy,dx),s=e.speed*dt;
  const nx=e.x+Math.cos(a)*s,ny=e.y+Math.sin(a)*s;
  if(map[Math.floor(ny)][Math.floor(nx)]===0){e.x=nx;e.y=ny}
  else if(map[Math.floor(e.y)][Math.floor(nx)]===0)e.x=nx;
  else if(map[Math.floor(ny)][Math.floor(e.x)]===0)e.y=ny;
}

// ═══ AUDIO ═══
let _ac=null;function ac(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac}
function hum(){try{const a=ac(),o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.value=60;g.gain.value=0.025;o.connect(g);g.connect(a.destination);o.start()}catch(e){}}
function step(){try{const a=ac(),b=a.createBufferSource(),buf=a.createBuffer(1,a.sampleRate*0.05,a.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()-0.5)*Math.exp(-i/(a.sampleRate*0.01))*0.2;b.buffer=buf;b.connect(a.destination);b.start()}catch(e){}}
function entSnd(){try{const a=ac(),o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.value=28+Math.random()*12;g.gain.setValueAtTime(0.04,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.4);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+0.4)}catch(e){}}

// ═══ UPDATE ═══
let stepT=0;
function update(dt){
  if(dead||won)return;
  gameTime+=dt;entTimer+=dt;

  // Input
  const spd=(running&&stamina>0)?5:3;
  let mx=0,my=0,moved=false;
  if(isMobile){
    if(Math.abs(jlx)>0.1||Math.abs(jly)>0.1){
      mx+=Math.cos(pa)*(-jly)+Math.cos(pa+Math.PI/2)*jlx;
      my+=Math.sin(pa)*(-jly)+Math.sin(pa+Math.PI/2)*jlx;
      moved=true;
    }
    if(Math.abs(jrx)>0.1||Math.abs(jry)>0.1){pa+=jrx*0.05;pp=Math.max(-0.5,Math.min(0.5,pp-jry*0.03))}
  }else{
    if(keys.KeyW||keys.ArrowUp){mx+=Math.cos(pa);my+=Math.sin(pa);moved=true}
    if(keys.KeyS||keys.ArrowDown){mx-=Math.cos(pa);my-=Math.sin(pa);moved=true}
    if(keys.KeyA||keys.ArrowLeft){mx+=Math.cos(pa-Math.PI/2);my+=Math.sin(pa-Math.PI/2);moved=true}
    if(keys.KeyD||keys.ArrowRight){mx+=Math.cos(pa+Math.PI/2);my+=Math.sin(pa+Math.PI/2);moved=true}
  }
  if(moved){
    const l=Math.hypot(mx,my)||1;mx/=l;my/=l;
    const nx=px+mx*spd*dt,ny=py+my*spd*dt;
    if(map[Math.floor(py)][Math.floor(nx)]===0)px=nx;
    if(map[Math.floor(ny)][Math.floor(px)]===0)py=ny;
    stepT+=dt*(running?1.5:1);if(stepT>0.35){stepT=0;step()}
  }
  if(running&&moved)stamina=Math.max(0,stamina-22*dt);else stamina=Math.min(100,stamina+8*dt);
  document.getElementById('stf').style.width=stamina+'%';

  // Lights flicker
  for(const l of lights){l.t+=dt;if(Math.random()<l.flicker){l.on=Math.random()>0.15;l.intensity=l.on?(0.5+Math.random()*0.7):0}}

  // Entities
  if(entTimer>50&&entities.length<3){spawnEnt();entTimer=0;showMsg("……");entSnd()}
  for(const e of entities){moveEnt(e,dt);if(Math.hypot(e.x-px,e.y-py)<8&&Math.random()<0.005)entSnd()}

  // Sanity
  let near=false;for(const e of entities)if(Math.hypot(e.x-px,e.y-py)<7)near=true;
  if(near)sanity=Math.max(0,sanity-5*dt);else sanity=Math.min(100,sanity+1.5*dt);
  document.getElementById('sf').style.width=sanity+'%';

  // Exit
  const ex=MAP_W-2+0.5,ey=MAP_H-2+0.5;
  if(Math.hypot(px-ex,py-ey)<0.6){won=true;showMsg("逃出来了……但这只是开始");setTimeout(()=>{document.getElementById('overlay').classList.remove('hidden');document.getElementById('overlay').innerHTML='<h1>逃 离</h1><div class="sub">'+fmt(gameTime)+'</div><p style="color:#444;margin-top:14px">后室还有无数层</p><button onclick="location.reload()">再来</button>'},1500)}

  document.getElementById('tm').textContent=fmt(gameTime);
  if(dead){document.getElementById('death').style.display='flex';document.getElementById('hud').classList.remove('show')}
}

function fmt(t){return String(Math.floor(t/60)).padStart(2,'0')+':'+String(Math.floor(t%60)).padStart(2,'0')}
function showMsg(t){const e=document.getElementById('msg');e.textContent=t;e.style.opacity='1';if(msgTO)clearTimeout(msgTO);msgTO=setTimeout(()=>e.style.opacity='0',2500)}

// ═══ INPUT ═══
document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='ShiftLeft'||e.code==='ShiftRight')running=true});
document.addEventListener('keyup',e=>{keys[e.code]=false;if(e.code==='ShiftLeft'||e.code==='ShiftRight')running=false});
document.addEventListener('pointerlockchange',()=>locked=!!document.pointerLockElement);
document.addEventListener('mousemove',e=>{if(!locked)return;pa+=e.movementX*0.002;pp=Math.max(-0.5,Math.min(0.5,pp-e.movementY*0.002))});
C.addEventListener('click',()=>{if(started&&!locked&&!isMobile)C.requestPointerLock()});

// Joystick
function initJoy(){
  const lB=document.querySelector('#jl .jb'),rB=document.querySelector('#jr .jb');
  const lS=document.getElementById('jsl'),rS=document.getElementById('jsr'),rb=document.getElementById('rb');
  const md=35;
  function ctr(b){const r=b.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}
  lB.addEventListener('touchstart',e=>{e.preventDefault();jlt=e.changedTouches[0].identifier;jlo=ctr(lB)},{passive:false});
  rB.addEventListener('touchstart',e=>{e.preventDefault();jrt=e.changedTouches[0].identifier;jro=ctr(rB)},{passive:false});
  document.addEventListener('touchmove',e=>{for(const t of e.changedTouches){
    if(t.identifier===jlt&&jlo){let dx=t.clientX-jlo.x,dy=t.clientY-jlo.y;const d=Math.hypot(dx,dy);if(d>md){dx=dx/d*md;dy=dy/d*md}jlx=dx/md;jly=dy/md;lS.style.transform=`translate(calc(-50%+${dx}px),calc(-50%+${dy}px))`}
    if(t.identifier===jrt&&jro){let dx=t.clientX-jro.x,dy=t.clientY-jro.y;const d=Math.hypot(dx,dy);if(d>md){dx=dx/d*md;dy=dy/d*md}jrx=dx/md;jry=dy/md;rS.style.transform=`translate(calc(-50%+${dx}px),calc(-50%+${dy}px))`}
  }},{passive:false});
  document.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===jlt){jlt=null;jlx=jly=0;lS.style.transform='translate(-50%,-50%)'}if(t.identifier===jrt){jrt=null;jrx=jry=0;rS.style.transform='translate(-50%,-50%)'}}});
  rb.addEventListener('touchstart',e=>{e.preventDefault();running=true;rb.classList.add('on')},{passive:false});
  rb.addEventListener('touchend',()=>{running=false;rb.classList.remove('on')});
}

// ═══ MAIN ═══
let lastTime=0;
function loop(time){
  requestAnimationFrame(loop);
  const dt=Math.min((time-lastTime)/1000,0.05);lastTime=time;
  if(started){update(dt);render()}
}

function start(){
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hud').classList.add('show');
  started=true;
  if(!isMobile)C.requestPointerLock();
  else{document.getElementById('jl').classList.add('show');document.getElementById('jr').classList.add('show');document.getElementById('rb').classList.add('show');initJoy()}
  hum();showMsg("找到出口……");
}

genMaze();
requestAnimationFrame(loop);
</script>
</body>
</html>
