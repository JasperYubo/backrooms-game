<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>后室 - Level 0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace}
canvas{display:block}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;color:#c9b458;transition:opacity .8s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:48px;letter-spacing:14px;margin-bottom:10px;text-shadow:0 0 30px rgba(201,180,88,.5)}
#overlay .sub{color:#666;font-size:11px;letter-spacing:4px;margin-bottom:36px}
#overlay p{color:#777;font-size:13px;margin-bottom:28px;text-align:center;line-height:2}
#overlay .start-btn{padding:14px 44px;border:1px solid rgba(201,180,88,.4);background:transparent;color:#c9b458;font-size:15px;cursor:pointer;letter-spacing:5px;font-family:inherit;transition:all .3s}
#hud{position:fixed;top:0;left:0;right:0;padding:12px 20px;z-index:10;display:none;justify-content:space-between;align-items:center;color:#c9b458;font-size:12px;pointer-events:none}
#hud.show{display:flex}
.bar{width:100px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;transition:width .2s}
#sanity-fill{background:linear-gradient(90deg,#c9b458,#e0d080);width:100%}
#stamina-fill{background:rgba(120,180,120,.7);width:100%}
#msg{position:fixed;bottom:45px;left:50%;transform:translateX(-50%);color:rgba(201,180,88,.7);font-size:13px;opacity:0;transition:opacity .6s;z-index:10;text-align:center;pointer-events:none;letter-spacing:2px}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:2px;border-radius:50%;background:rgba(201,180,88,.4);z-index:10;display:none}
#death{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;color:#c9b458}
#death h2{font-size:30px;letter-spacing:8px;margin-bottom:14px;font-weight:300}
#death p{color:#555;font-size:12px;margin-bottom:28px}
#death button{padding:10px 30px;border:1px solid rgba(201,180,88,.4);background:transparent;color:#c9b458;font-size:13px;cursor:pointer;font-family:inherit;letter-spacing:2px}
.joystick-zone{position:fixed;bottom:25px;z-index:20;display:none}
.joystick-zone.show{display:block}
#joystick-left{left:25px}
#joystick-right{right:25px}
.joy-base{width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid rgba(201,180,88,.2)}
.joy-stick{width:44px;height:44px;border-radius:50%;background:rgba(201,180,88,.2);border:1px solid rgba(201,180,88,.35);position:relative;top:50%;left:50%;transform:translate(-50%,-50%)}
#run-btn{position:fixed;bottom:150px;left:45px;width:42px;height:42px;border-radius:50%;background:rgba(201,180,88,.06);border:1px solid rgba(201,180,88,.25);z-index:20;display:none;align-items:center;justify-content:center;color:rgba(201,180,88,.6);font-size:10px;font-family:inherit}
#run-btn.show{display:flex}
#run-btn.active{background:rgba(201,180,88,.2)}
</style>
</head>
<body>
<div id="overlay">
  <h1>后 室</h1>
  <div class="sub">LEVEL 0</div>
  <p>电脑：WASD · 鼠标 · Shift跑<br>手机：双摇杆 · 跑按钮<br><br><span style="color:#444">听到脚步声，跑。</span></p>
  <button class="start-btn" onclick="startGame()">进 入</button>
</div>
<div id="hud">
  <div style="display:flex;gap:12px;align-items:center"><span id="level-txt">LEVEL 0</span><div class="bar"><div class="bar-fill" id="sanity-fill"></div></div></div>
  <div style="display:flex;gap:12px;align-items:center"><div class="bar"><div class="bar-fill" id="stamina-fill"></div></div><span id="timer">00:00</span></div>
</div>
<div id="msg"></div>
<div id="crosshair"></div>
<div class="joystick-zone" id="joystick-left"><div class="joy-base"><div class="joy-stick" id="joy-stick-l"></div></div></div>
<div class="joystick-zone" id="joystick-right"><div class="joy-base"><div class="joy-stick" id="joy-stick-r"></div></div></div>
<div id="run-btn">跑</div>
<div id="death"><h2>你被抓住了</h2><p>在后室中没有人能听到你的尖叫</p><button onclick="location.reload()">重新开始</button></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
<script>
const CELL=4.5,WALL_H=3.0,MAZE_W=18,MAZE_H=18;
const MOVE_SPEED=3.5,RUN_SPEED=6,MOUSE_SENS=0.0018;
const ENTITY_SPEED=2.6,ENTITY_SPAWN_TIME=55;

let scene,camera,renderer,composer,clock;
let maze=[],playerPos={x:0,z:0},playerY=1.5;
let pitch=0,yaw=0,locked=false;
let keys={},running=false,stamina=100,sanity=100;
let entities=[],entityTimer=0,gameTime=0,gameStarted=false;
let exitPos=null,won=false,dead=false;
let flickerLights=[],msgTimeout=null;
const isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)||('ontouchstart' in window);
let joyLX=0,joyLY=0,joyRX=0,joyRY=0,joyLTouchId=null,joyRTouchId=null,joyLOrigin=null,joyROrigin=null;

function genMaze(w,h){
  const g=Array.from({length:h},()=>Array.from({length:w},()=>({n:1,s:1,e:1,w:1,v:false})));
  const st=[];let cx=0,cy=0;g[0][0].v=true;st.push([0,0]);
  while(st.length){const[x,y]=st[st.length-1];const nb=[];
    if(y>0&&!g[y-1][x].v)nb.push([x,y-1,'n','s']);if(y<h-1&&!g[y+1][x].v)nb.push([x,y+1,'s','n']);
    if(x<w-1&&!g[y][x+1].v)nb.push([x+1,y,'e','w']);if(x>0&&!g[y][x-1].v)nb.push([x-1,y,'w','e']);
    if(nb.length){const[nx,ny,d1,d2]=nb[Math.floor(Math.random()*nb.length)];g[y][x][d1]=0;g[ny][nx][d2]=0;g[ny][nx].v=true;st.push([nx,ny])}else st.pop()}
  for(let i=0;i<Math.floor(w*h*0.2);i++){const rx=Math.floor(Math.random()*w),ry=Math.floor(Math.random()*h);
    const ds=['n','s','e','w'],d=ds[Math.floor(Math.random()*4)],op={n:'s',s:'n',e:'w',w:'e'};
    const nx=d==='e'?rx+1:d==='w'?rx-1:rx,ny=d==='s'?ry+1:d==='n'?ry-1:ry;
    if(nx>=0&&nx<w&&ny>=0&&ny<h){g[ry][rx][d]=0;g[ny][nx][op[d]]=0}}
  return g;
}

function makeTex(fn,sz){const c=document.createElement('canvas');c.width=c.height=sz;fn(c.getContext('2d'),sz);const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.anisotropy=4;return t}

function wallTex(){return makeTex((ctx,S)=>{
  ctx.fillStyle='#b89525';ctx.fillRect(0,0,S,S);
  for(let x=0;x<S;x+=20){ctx.fillStyle=`rgba(160,130,30,${0.04+Math.random()*0.06})`;ctx.fillRect(x,0,10,S)}
  for(let i=0;i<30;i++){ctx.beginPath();ctx.arc(Math.random()*S,Math.random()*S,Math.random()*40+10,0,Math.PI*2);ctx.fillStyle=`rgba(80,60,20,${Math.random()*0.1})`;ctx.fill()}
  for(let i=0;i<5;i++){let x=Math.random()*S,y=0;ctx.strokeStyle=`rgba(60,40,10,${0.08+Math.random()*0.08})`;ctx.lineWidth=Math.random()*2+1;ctx.beginPath();ctx.moveTo(x,y);while(y<S){y+=Math.random()*20+5;ctx.lineTo(x+(Math.random()-0.5)*4,y)}ctx.stroke()}
},512)}

function floorTex(){return makeTex((ctx,S)=>{
  ctx.fillStyle='#2e2418';ctx.fillRect(0,0,S,S);
  for(let i=0;i<5000;i++){ctx.fillStyle=`rgba(${40+Math.random()*20},${30+Math.random()*15},${15+Math.random()*10},${0.3+Math.random()*0.3})`;ctx.fillRect(Math.random()*S,Math.random()*S,1.5,1.5)}
  for(let i=0;i<8;i++){ctx.beginPath();ctx.arc(Math.random()*S,Math.random()*S,Math.random()*35+10,0,Math.PI*2);ctx.fillStyle=`rgba(15,10,5,${0.15+Math.random()*0.15})`;ctx.fill()}
},512)}

function ceilTex(){return makeTex((ctx,S)=>{
  ctx.fillStyle='#ccc0a0';ctx.fillRect(0,0,S,S);
  ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=2;
  for(let x=0;x<=S;x+=S/4){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,S);ctx.stroke()}
  for(let y=0;y<=S;y+=S/4){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(S,y);ctx.stroke()}
  for(let i=0;i<10;i++){ctx.beginPath();ctx.arc(Math.random()*S,Math.random()*S,Math.random()*50+15,0,Math.PI*2);ctx.fillStyle=`rgba(150,130,60,${Math.random()*0.08})`;ctx.fill()}
},512)}

function buildScene(){
  scene=new THREE.Scene();scene.background=new THREE.Color(0x080604);
  scene.fog=new THREE.FogExp2(0x080604,0.05);
  const wm=new THREE.MeshStandardMaterial({map:wallTex(),roughness:0.88,metalness:0});
  const fm=new THREE.MeshStandardMaterial({map:floorTex(),roughness:0.95,metalness:0});
  const cm=new THREE.MeshStandardMaterial({map:ceilTex(),roughness:0.9,metalness:0});
  maze=genMaze(MAZE_W,MAZE_H);
  const fGeo=new THREE.PlaneGeometry(MAZE_W*CELL,MAZE_H*CELL);
  const fl=new THREE.Mesh(fGeo,fm);fl.rotation.x=-Math.PI/2;fl.position.set(MAZE_W*CELL/2,0,MAZE_H*CELL/2);scene.add(fl);
  const ce=new THREE.Mesh(fGeo.clone(),cm);ce.rotation.x=Math.PI/2;ce.position.set(MAZE_W*CELL/2,WALL_H,MAZE_H*CELL/2);scene.add(ce);
  const wGeo=new THREE.PlaneGeometry(CELL,WALL_H);
  for(let y=0;y<MAZE_H;y++)for(let x=0;x<MAZE_W;x++){
    const c=maze[y][x],cx2=x*CELL+CELL/2,cz=y*CELL+CELL/2;
    if(c.n){const w=new THREE.Mesh(wGeo,wm);w.position.set(cx2,WALL_H/2,y*CELL);scene.add(w);const w2=w.clone();w2.rotation.y=Math.PI;w2.position.copy(w.position);scene.add(w2)}
    if(c.s&&y===MAZE_H-1){const w=new THREE.Mesh(wGeo,wm);w.position.set(cx2,WALL_H/2,(y+1)*CELL);w.rotation.y=Math.PI;scene.add(w);const w2=w.clone();w2.rotation.y=0;w2.position.copy(w.position);scene.add(w2)}
    if(c.w){const w=new THREE.Mesh(wGeo,wm);w.position.set(x*CELL,WALL_H/2,cz);w.rotation.y=Math.PI/2;scene.add(w);const w2=w.clone();w2.rotation.y=-Math.PI/2;w2.position.copy(w.position);scene.add(w2)}
    if(c.e&&x===MAZE_W-1){const w=new THREE.Mesh(wGeo,wm);w.position.set((x+1)*CELL,WALL_H/2,cz);w.rotation.y=-Math.PI/2;scene.add(w);const w2=w.clone();w2.rotation.y=Math.PI/2;w2.position.copy(w.position);scene.add(w2)}
  }
  scene.add(new THREE.AmbientLight(0xc9a040,0.06));
  flickerLights=[];
  const fxGeo=new THREE.BoxGeometry(1.6,0.05,0.15);
  for(let y=0;y<MAZE_H;y+=2)for(let x=0;x<MAZE_W;x+=2){
    const lx=x*CELL+CELL/2,lz=y*CELL+CELL/2;
    const pl=new THREE.PointLight(0xffe0a0,1.5,CELL*2.2,2);pl.position.set(lx,WALL_H-0.12,lz);scene.add(pl);
    const fxMat=new THREE.MeshBasicMaterial({color:0xffeecc});
    const fx=new THREE.Mesh(fxGeo,fxMat);fx.position.set(lx,WALL_H-0.03,lz);scene.add(fx);
    flickerLights.push({light:pl,fix:fx,base:1.5,t:Math.random()*50,rate:0.003+Math.random()*0.008});
  }
  exitPos={x:(MAZE_W-1)*CELL+CELL/2,z:(MAZE_H-1)*CELL+CELL/2};
  scene.add(new THREE.PointLight(0x33ff55,0.6,5,2).copy(Object.assign(new THREE.PointLight(0x33ff55,0.6,5,2),{position:new THREE.Vector3(exitPos.x,1.5,exitPos.z)})));
  const el=new THREE.PointLight(0x33ff55,0.6,5,2);el.position.set(exitPos.x,1.5,exitPos.z);scene.add(el);
  playerPos={x:CELL/2,z:CELL/2};
}

function setupPost(){
  composer=new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene,camera));
  const bloom=new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),0.5,0.3,0.9);
  composer.addPass(bloom);
}

function spawnEntity(){
  let ex,ez;for(let i=0;i<50;i++){ex=Math.floor(Math.random()*MAZE_W)*CELL+CELL/2;ez=Math.floor(Math.random()*MAZE_H)*CELL+CELL/2;if(Math.hypot(ex-playerPos.x,ez-playerPos.z)>CELL*7)break}
  const m=new THREE.Mesh(new THREE.CapsuleGeometry(0.22,1.5,4,8),new THREE.MeshStandardMaterial({color:0x080808,roughness:1}));
  m.position.set(ex,1,ez);scene.add(m);
  const eM=new THREE.MeshBasicMaterial({color:0xff1100});
  const e1=new THREE.Mesh(new THREE.SphereGeometry(0.035),eM);e1.position.set(-0.07,0.6,0.18);m.add(e1);
  const e2=e1.clone();e2.position.set(0.07,0.6,0.18);m.add(e2);
  entities.push({mesh:m,x:ex,z:ez,speed:ENTITY_SPEED+Math.random()*.8});
}

function canMove(nx,nz,r){
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    const cx=Math.floor(nx/CELL)+dx,cz=Math.floor(nz/CELL)+dy;
    if(cx<0||cx>=MAZE_W||cz<0||cz>=MAZE_H)continue;
    const c=maze[cz][cx],wx=cx*CELL,wz=cz*CELL;
    if(c.n&&nz-r<wz&&nz>wz-0.2&&nx>wx-r&&nx<wx+CELL+r)return false;
    if(c.s&&cz===MAZE_H-1&&nz+r>(cz+1)*CELL&&nx>wx-r&&nx<wx+CELL+r)return false;
    if(c.w&&nx-r<wx&&nx>wx-0.2&&nz>wz-r&&nz<wz+CELL+r)return false;
    if(c.e&&cx===MAZE_W-1&&nx+r>(cx+1)*CELL&&nz>wz-r&&nz<wz+CELL+r)return false;
  }
  if(nx-r<0||nx+r>MAZE_W*CELL||nz-r<0||nz+r>MAZE_H*CELL)return false;return true;
}

function moveEntity(e,dt){
  const dx=playerPos.x-e.x,dz=playerPos.z-e.z,dist=Math.hypot(dx,dz);
  if(dist<0.6){dead=true;return}
  const a=Math.atan2(dz,dx),s=e.speed*dt;
  let nx=e.x+Math.cos(a)*s,nz=e.z+Math.sin(a)*s;
  if(canMove(nx,nz,0.22)){e.x=nx;e.z=nz}else if(canMove(nx,e.z,0.22))e.x=nx;else if(canMove(e.x,nz,0.22))e.z=nz;
  e.mesh.position.set(e.x,1,e.z);e.mesh.rotation.y=Math.atan2(-(playerPos.x-e.x),-(playerPos.z-e.z));
}

let _ac=null;function ac(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac}
function playHum(){try{const a=ac(),o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.value=60;g.gain.value=0.03;o.connect(g);g.connect(a.destination);o.start()}catch(e){}}
function playStep(){try{const a=ac(),b=a.createBufferSource(),buf=a.createBuffer(1,a.sampleRate*0.06,a.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()-0.5)*Math.exp(-i/(a.sampleRate*0.015))*0.25;b.buffer=buf;b.connect(a.destination);b.start()}catch(e){}}
function playEnt(){try{const a=ac(),o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.value=30+Math.random()*15;g.gain.setValueAtTime(0.04,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.5);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+0.5)}catch(e){}}

function initJoysticks(){
  const lB=document.querySelector('#joystick-left .joy-base'),rB=document.querySelector('#joystick-right .joy-base');
  const lS=document.getElementById('joy-stick-l'),rS=document.getElementById('joy-stick-r');
  const rb=document.getElementById('run-btn');const md=38;
  function ctr(b){const r=b.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}
  lB.addEventListener('touchstart',e=>{e.preventDefault();joyLTouchId=e.changedTouches[0].identifier;joyLOrigin=ctr(lB)},{passive:false});
  rB.addEventListener('touchstart',e=>{e.preventDefault();joyRTouchId=e.changedTouches[0].identifier;joyROrigin=ctr(rB)},{passive:false});
  document.addEventListener('touchmove',e=>{for(const t of e.changedTouches){
    if(t.identifier===joyLTouchId&&joyLOrigin){let dx=t.clientX-joyLOrigin.x,dy=t.clientY-joyLOrigin.y;const d=Math.hypot(dx,dy);if(d>md){dx=dx/d*md;dy=dy/d*md}joyLX=dx/md;joyLY=dy/md;lS.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`}
    if(t.identifier===joyRTouchId&&joyROrigin){let dx=t.clientX-joyROrigin.x,dy=t.clientY-joyROrigin.y;const d=Math.hypot(dx,dy);if(d>md){dx=dx/d*md;dy=dy/d*md}joyRX=dx/md;joyRY=dy/md;rS.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`}
  }},{passive:false});
  document.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===joyLTouchId){joyLTouchId=null;joyLX=joyLY=0;lS.style.transform='translate(-50%,-50%)'}if(t.identifier===joyRTouchId){joyRTouchId=null;joyRX=joyRY=0;rS.style.transform='translate(-50%,-50%)'}}});
  rb.addEventListener('touchstart',e=>{e.preventDefault();running=true;rb.classList.add('active')},{passive:false});
  rb.addEventListener('touchend',()=>{running=false;rb.classList.remove('active')});
}

let stepT=0;
function update(dt){
  if(dead||won)return;gameTime+=dt;entityTimer+=dt;
  const fw=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw)),rt=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
  const spd=(running&&stamina>0)?RUN_SPEED:MOVE_SPEED;let moved=false,mx=0,mz=0;
  if(isMobile){if(Math.abs(joyLX)>0.1||Math.abs(joyLY)>0.1){mx+=fw.x*(-joyLY)+rt.x*joyLX;mz+=fw.z*(-joyLY)+rt.z*joyLX;moved=true}if(Math.abs(joyRX)>0.1||Math.abs(joyRY)>0.1){yaw-=joyRX*0.035;pitch-=joyRY*0.025;pitch=Math.max(-1.2,Math.min(1.2,pitch))}}
  else{if(keys.KeyW||keys.ArrowUp){mx+=fw.x;mz+=fw.z;moved=true}if(keys.KeyS||keys.ArrowDown){mx-=fw.x;mz-=fw.z;moved=true}if(keys.KeyA||keys.ArrowLeft){mx-=rt.x;mz-=rt.z;moved=true}if(keys.KeyD||keys.ArrowRight){mx+=rt.x;mz+=rt.z;moved=true}}
  if(moved){const l=Math.hypot(mx,mz)||1;mx/=l;mz/=l;const nx=playerPos.x+mx*spd*dt,nz=playerPos.z+mz*spd*dt;if(canMove(nx,playerPos.z,0.25))playerPos.x=nx;if(canMove(playerPos.x,nz,0.25))playerPos.z=nz;stepT+=dt*(running?1.5:1);if(stepT>0.4){stepT=0;playStep()}}
  if(running&&moved)stamina=Math.max(0,stamina-25*dt);else stamina=Math.min(100,stamina+10*dt);
  document.getElementById('stamina-fill').style.width=stamina+'%';
  playerY=1.5+(moved?Math.sin(gameTime*(running?10:7))*(running?0.035:0.018):0);
  camera.position.set(playerPos.x,playerY,playerPos.z);camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;

  for(const fl of flickerLights){fl.t+=dt;if(Math.random()<fl.rate){const off=Math.random()<0.2;fl.light.intensity=off?0:fl.base*(0.6+Math.random()*0.8);fl.fix.material.opacity=off?0.1:0.7+Math.random()*0.3}}
  if(entityTimer>ENTITY_SPAWN_TIME&&entities.length<3){spawnEntity();entityTimer=0;showMsg("……");playEnt()}
  for(const e of entities){moveEntity(e,dt);if(Math.hypot(e.x-playerPos.x,e.z-playerPos.z)<9&&Math.random()<0.006)playEnt()}

  let near=false;for(const e of entities)if(Math.hypot(e.x-playerPos.x,e.z-playerPos.z)<9)near=true;
  if(near)sanity=Math.max(0,sanity-6*dt);else sanity=Math.min(100,sanity+2*dt);
  document.getElementById('sanity-fill').style.width=sanity+'%';
  if(sanity<30){scene.fog.density=0.05+0.025*(1-sanity/30);camera.rotation.z=Math.sin(gameTime*2.5)*0.012*(1-sanity/30)}else{scene.fog.density=0.05;camera.rotation.z=0}

  if(Math.hypot(playerPos.x-exitPos.x,playerPos.z-exitPos.z)<1.5){won=true;showMsg("逃出来了……但这只是开始。");setTimeout(()=>{document.getElementById('overlay').classList.remove('hidden');document.getElementById('overlay').innerHTML='<h1>逃 离</h1><div class="sub">'+formatTime(gameTime)+'</div><p style="color:#555;margin-top:16px">后室还有无数层</p><button class="start-btn" onclick="location.reload()">再来</button>'},2000)}
  document.getElementById('timer').textContent=formatTime(gameTime);
  if(dead){document.getElementById('death').style.display='flex';document.getElementById('hud').classList.remove('show');document.getElementById('crosshair').style.display='none'}
}

function formatTime(t){return String(Math.floor(t/60)).padStart(2,'0')+':'+String(Math.floor(t%60)).padStart(2,'0')}
function showMsg(t){const e=document.getElementById('msg');e.textContent=t;e.style.opacity='1';if(msgTimeout)clearTimeout(msgTimeout);msgTimeout=setTimeout(()=>e.style.opacity='0',3000)}

function init(){
  camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,60);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=0.85;
  renderer.outputEncoding=THREE.sRGBEncoding;
  document.body.appendChild(renderer.domElement);clock=new THREE.Clock();
  buildScene();setupPost();
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight)});
  renderer.domElement.addEventListener('click',()=>{if(gameStarted&&!locked&&!isMobile)renderer.domElement.requestPointerLock()});
  document.addEventListener('pointerlockchange',()=>locked=!!document.pointerLockElement);
  document.addEventListener('mousemove',e=>{if(!locked)return;yaw-=e.movementX*MOUSE_SENS;pitch-=e.movementY*MOUSE_SENS;pitch=Math.max(-1.3,Math.min(1.3,pitch))});
  document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='ShiftLeft'||e.code==='ShiftRight')running=true});
  document.addEventListener('keyup',e=>{keys[e.code]=false;if(e.code==='ShiftLeft'||e.code==='ShiftRight')running=false});
  animate();
}

function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.05);if(gameStarted)update(dt);composer.render()}

function startGame(){
  document.getElementById('overlay').classList.add('hidden');document.getElementById('hud').classList.add('show');gameStarted=true;
  if(!isMobile){document.getElementById('crosshair').style.display='block';renderer.domElement.requestPointerLock()}
  else{document.getElementById('joystick-left').classList.add('show');document.getElementById('joystick-right').classList.add('show');document.getElementById('run-btn').classList.add('show');initJoysticks()}
  playHum();showMsg("找到出口……");
}
init();
</script>
</body>
</html>
