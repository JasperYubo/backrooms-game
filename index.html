<body>
<div id="overlay">

<script>
// ═══ THREE.JS LOADER (r128) ═══
const scripts=[
  'https://unpkg.com/three@0.128.0/build/three.min.js',
  'https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js',
  'https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js',
  'https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js',
  'https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js',
  'https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js',
  'https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js'
];
let loaded=0;
function loadNext(){
  if(loaded>=scripts.length){initGame();return}
  const s=document.createElement('script');
  s.src=scripts[loaded];
  s.onload=()=>{loaded++;loadNext()};
  s.onerror=()=>{const s2=document.createElement('script');s2.src=scripts[loaded].replace('unpkg.com','cdn.jsdelivr.net/npm');s2.onload=()=>{loaded++;loadNext()};s2.onerror=()=>{loaded++;loadNext()};document.head.appendChild(s2)};
  document.head.appendChild(s);
}
loadNext();

function initGame(){
const isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)||('ontouchstart' in window);
let scene,camera,renderer,composer,clock;
let maze=[],playerPos={x:0,z:0},playerY=1.5;
let pitch=0,yaw=0,locked=false;
let keys={},running=false,stamina=100,sanity=100;
let entities=[],entityTimer=0,gameTime=0,started2=false;
let exitPos=null,won=false,dead=false;
let flickerLights=[],msgTO=null;
let jlx=0,jly=0,jlt=null,jlo=null;
let lookTouchId=null,lookLastX=0,lookLastY=0;
const mmapCanvas=document.getElementById('minimap');
const mmapCtx=mmapCanvas.getContext('2d');

const CELL=4.5,WALL_H=2.8,WALL_THICK=0.25,MW=16,MH=16;
const MOVE_SPD=3.8,RUN_SPD=7,M_SENS=0.002;

// ─── Maze (with big rooms, L/T shapes, long corridors) ───
function genMaze(w,h){
  const g=Array.from({length:h},()=>Array.from({length:w},()=>({n:1,s:1,e:1,w:1,v:false})));
  // Step 1: DFS base maze
  const st=[];g[0][0].v=true;st.push([0,0]);
  while(st.length){const[x,y]=st[st.length-1];const nb=[];
    if(y>0&&!g[y-1][x].v)nb.push([x,y-1,'n','s']);if(y<h-1&&!g[y+1][x].v)nb.push([x,y+1,'s','n']);
    if(x<w-1&&!g[y][x+1].v)nb.push([x+1,y,'e','w']);if(x>0&&!g[y][x-1].v)nb.push([x-1,y,'w','e']);
    if(nb.length){const[nx,ny,d1,d2]=nb[Math.floor(Math.random()*nb.length)];g[y][x][d1]=0;g[ny][nx][d2]=0;g[ny][nx].v=true;st.push([nx,ny])}else st.pop()}
  // Step 2: Extra passages for openness
  for(let i=0;i<Math.floor(w*h*0.35);i++){const rx=Math.floor(Math.random()*w),ry=Math.floor(Math.random()*h);
    const ds=['n','s','e','w'],d=ds[Math.floor(Math.random()*4)],op={n:'s',s:'n',e:'w',w:'e'};
    const nx2=d==='e'?rx+1:d==='w'?rx-1:rx,ny2=d==='s'?ry+1:d==='n'?ry-1:ry;
    if(nx2>=0&&nx2<w&&ny2>=0&&ny2<h){g[ry][rx][d]=0;g[ny2][nx2][op[d]]=0}}
  // Step 3: Carve big rooms (3x3, 4x3, 4x4)
  const roomCount=2;
  for(let r=0;r<roomCount;r++){
    const rw=2+Math.floor(Math.random()*2),rh=2+Math.floor(Math.random()*2);
    const rx=1+Math.floor(Math.random()*(w-rw-1)),ry=1+Math.floor(Math.random()*(h-rh-1));
    for(let dy=0;dy<rh;dy++)for(let dx=0;dx<rw;dx++){
      const cx=rx+dx,cy=ry+dy;
      if(cx<w-1){g[cy][cx].e=0;g[cy][cx+1].w=0}
      if(cy<h-1){g[cy][cx].s=0;g[cy+1][cx].n=0}
    }
  }
  // Step 4: Carve long corridors (horizontal and vertical)
  const corrCount=2+Math.floor(Math.random()*2);
  for(let c=0;c<corrCount;c++){
    if(Math.random()>0.5){// horizontal
      const cy=1+Math.floor(Math.random()*(h-2)),sx=Math.floor(Math.random()*(w-6));
      const len=5+Math.floor(Math.random()*6);
      for(let i=0;i<len&&sx+i<w-1;i++){g[cy][sx+i].e=0;g[cy][sx+i+1].w=0}
    }else{// vertical
      const cx=1+Math.floor(Math.random()*(w-2)),sy=Math.floor(Math.random()*(h-6));
      const len=5+Math.floor(Math.random()*6);
      for(let i=0;i<len&&sy+i<h-1;i++){g[sy+i][cx].s=0;g[sy+i+1][cx].n=0}
    }
  }
  return g;
}

// ─── BFS ───
function bfsNext(fromX,fromZ,toX,toZ){
  const sx=Math.floor(fromX/CELL),sy=Math.floor(fromZ/CELL);
  const tx=Math.floor(toX/CELL),ty=Math.floor(toZ/CELL);
  if(sx===tx&&sy===ty)return{x:toX,z:toZ};
  const visited=Array.from({length:MH},()=>Array(MW).fill(false));
  const parent=Array.from({length:MH},()=>Array(MW).fill(null));
  const queue=[[sx,sy]];visited[sy][sx]=true;
  while(queue.length){const[cx,cy]=queue.shift();if(cx===tx&&cy===ty)break;const c=maze[cy][cx];
    if(!c.n&&cy>0&&!visited[cy-1][cx]){visited[cy-1][cx]=true;parent[cy-1][cx]=[cx,cy];queue.push([cx,cy-1])}
    if(!c.s&&cy<MH-1&&!visited[cy+1][cx]){visited[cy+1][cx]=true;parent[cy+1][cx]=[cx,cy];queue.push([cx,cy+1])}
    if(!c.w&&cx>0&&!visited[cy][cx-1]){visited[cy][cx-1]=true;parent[cy][cx-1]=[cx,cy];queue.push([cx-1,cy])}
    if(!c.e&&cx<MW-1&&!visited[cy][cx+1]){visited[cy][cx+1]=true;parent[cy][cx+1]=[cx,cy];queue.push([cx+1,cy])}}
  if(!visited[ty][tx])return null;
  let cur=[tx,ty];while(parent[cur[1]][cur[0]]){const p=parent[cur[1]][cur[0]];if(p[0]===sx&&p[1]===sy)break;cur=p}
  return{x:cur[0]*CELL+CELL/2,z:cur[1]*CELL+CELL/2};
}

// ─── Minimap (fog of war: only show visited cells) ───
const visited=Array.from({length:MH},()=>Array(MW).fill(false));
function drawMinimap(){
  // Mark current cell as visited
  const pcx=Math.floor(playerPos.x/CELL),pcz=Math.floor(playerPos.z/CELL);
  if(pcx>=0&&pcx<MW&&pcz>=0&&pcz<MH)visited[pcz][pcx]=true;
  // Also reveal adjacent cells
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){const nx=pcx+dx,nz=pcz+dy;if(nx>=0&&nx<MW&&nz>=0&&nz<MH)visited[nz][nx]=true}
  const S=140,cs=S/MW;
  mmapCtx.fillStyle='rgba(0,0,0,0.9)';mmapCtx.fillRect(0,0,S,S);
  mmapCtx.strokeStyle='rgba(201,180,88,0.35)';mmapCtx.lineWidth=1;
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){
    if(!visited[y][x])continue; // fog of war
    const c=maze[y][x];
    if(c.n){mmapCtx.beginPath();mmapCtx.moveTo(x*cs,y*cs);mmapCtx.lineTo((x+1)*cs,y*cs);mmapCtx.stroke()}
    if(c.w){mmapCtx.beginPath();mmapCtx.moveTo(x*cs,y*cs);mmapCtx.lineTo(x*cs,(y+1)*cs);mmapCtx.stroke()}
    if(c.s){mmapCtx.beginPath();mmapCtx.moveTo(x*cs,(y+1)*cs);mmapCtx.lineTo((x+1)*cs,(y+1)*cs);mmapCtx.stroke()}
    if(c.e){mmapCtx.beginPath();mmapCtx.moveTo((x+1)*cs,y*cs);mmapCtx.lineTo((x+1)*cs,(y+1)*cs);mmapCtx.stroke()}
    // Floor tint for visited
    mmapCtx.fillStyle='rgba(201,180,88,0.04)';mmapCtx.fillRect(x*cs,y*cs,cs,cs);
  }
  // Entities (red dots, only if in visited area)
  mmapCtx.fillStyle='#ff2200';
  for(const e of entities){const ex=Math.floor(e.x/CELL),ez=Math.floor(e.z/CELL);if(ex>=0&&ex<MW&&ez>=0&&ez<MH&&visited[ez][ex]){const mx=e.x/CELL*cs,mz=e.z/CELL*cs;mmapCtx.beginPath();mmapCtx.arc(mx,mz,2.5,0,Math.PI*2);mmapCtx.fill()}}
  // Exit (yellow, only if in visited area near exit)
  const exitCX=Math.floor(exitPos.x/CELL),exitCZ=Math.floor(exitPos.z/CELL);
  if(exitCX>=0&&exitCX<MW&&exitCZ>=0&&exitCZ<MH&&visited[exitCZ][exitCX]){const ex2=exitPos.x/CELL*cs,ez2=exitPos.z/CELL*cs;mmapCtx.fillStyle='#c9b458';mmapCtx.fillRect(ex2-3,ez2-3,6,6)}
  // Player (green)
  const px2=playerPos.x/CELL*cs,pz=playerPos.z/CELL*cs;
  mmapCtx.fillStyle='#44ff44';mmapCtx.beginPath();mmapCtx.arc(px2,pz,3,0,Math.PI*2);mmapCtx.fill();
  mmapCtx.strokeStyle='#44ff44';mmapCtx.lineWidth=1.5;mmapCtx.beginPath();mmapCtx.moveTo(px2,pz);mmapCtx.lineTo(px2+Math.sin(yaw)*8,pz+Math.cos(yaw)*8);mmapCtx.stroke();
  // Radar sweep line
  const sweep=gameTime*1.2%(Math.PI*2);
  mmapCtx.strokeStyle='rgba(201,180,88,0.25)';mmapCtx.lineWidth=1;mmapCtx.beginPath();mmapCtx.moveTo(px2,pz);mmapCtx.lineTo(px2+Math.sin(sweep)*S*0.6,pz+Math.cos(sweep)*S*0.6);mmapCtx.stroke();
  // Radar circle outline
  mmapCtx.strokeStyle='rgba(201,180,88,0.2)';mmapCtx.lineWidth=0.5;mmapCtx.beginPath();mmapCtx.arc(S/2,S/2,S/2-2,0,Math.PI*2);mmapCtx.stroke();
  mmapCtx.beginPath();mmapCtx.arc(S/2,S/2,S/4,0,Math.PI*2);mmapCtx.stroke();
}

// ─── Textures ───
function mkTex(fn,sz){const c=document.createElement('canvas');c.width=c.height=sz;fn(c.getContext('2d'),sz);const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.anisotropy=4;return t}
function wallTex(){return mkTex((ctx,S)=>{
  const grd=ctx.createLinearGradient(0,0,0,S);grd.addColorStop(0,'#c4a030');grd.addColorStop(0.4,'#b89025');grd.addColorStop(0.7,'#a88020');grd.addColorStop(1,'#987018');
  ctx.fillStyle=grd;ctx.fillRect(0,0,S,S);
  for(let x=0;x<S;x+=20){ctx.fillStyle=`rgba(150,120,25,${0.03+Math.random()*0.07})`;ctx.fillRect(x,0,10,S)}
  for(let y=0;y<S;y+=40){ctx.fillStyle=`rgba(130,100,20,${0.02+Math.random()*0.04})`;ctx.fillRect(0,y,S,1.5)}
  for(let i=0;i<6;i++){let x=Math.random()*S,y=0;ctx.strokeStyle=`rgba(60,40,15,${0.08+Math.random()*0.1})`;ctx.lineWidth=Math.random()*4+2;ctx.beginPath();ctx.moveTo(x,y);while(y<S){y+=Math.random()*20+8;ctx.lineTo(x+(Math.random()-0.5)*5,y)}ctx.stroke()}
  for(let i=0;i<12;i++){const g2=ctx.createRadialGradient(Math.random()*S,Math.random()*S,0,Math.random()*S,Math.random()*S,Math.random()*40+15);g2.addColorStop(0,`rgba(${40+Math.random()*30},${50+Math.random()*20},${20+Math.random()*15},${0.08+Math.random()*0.1})`);g2.addColorStop(1,'transparent');ctx.fillStyle=g2;ctx.fillRect(0,0,S,S)}
  const img=ctx.getImageData(0,0,S,S);for(let i=0;i<img.data.length;i+=4){const n=(Math.random()-0.5)*8;img.data[i]+=n;img.data[i+1]+=n;img.data[i+2]+=n}ctx.putImageData(img,0,0);
},512)}
function floorTex(){return mkTex((ctx,S)=>{
  ctx.fillStyle='#3d2e1a';ctx.fillRect(0,0,S,S);
  for(let i=0;i<6000;i++){const v=Math.random()*15;ctx.fillStyle=`rgba(${50+v},${38+v},${20+v},${0.3+Math.random()*0.4})`;ctx.fillRect(Math.random()*S,Math.random()*S,1.5,1.5)}
  for(let i=0;i<10;i++){const g=ctx.createRadialGradient(Math.random()*S,Math.random()*S,0,Math.random()*S,Math.random()*S,Math.random()*45+15);g.addColorStop(0,`rgba(20,15,5,${0.15+Math.random()*0.15})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,S,S)}
},512)}
function ceilTex(){return mkTex((ctx,S)=>{
  ctx.fillStyle='#d0c4a0';ctx.fillRect(0,0,S,S);
  ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=2.5;const ts=S/4;
  for(let x=0;x<=S;x+=ts){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,S);ctx.stroke()}
  for(let y=0;y<=S;y+=ts){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(S,y);ctx.stroke()}
  for(let i=0;i<10;i++){const g=ctx.createRadialGradient(Math.random()*S,Math.random()*S,0,Math.random()*S,Math.random()*S,Math.random()*50+20);g.addColorStop(0,`rgba(160,130,50,${Math.random()*0.1})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,S,S)}
},512)}

// ─── Build Scene ───
function buildScene(){
  scene=new THREE.Scene();scene.background=new THREE.Color(0x0a0804);
  scene.fog=new THREE.FogExp2(0x2a2010,0.018);// warm yellow fog, not black void
  // Bright yellow wall texture (procedural, guaranteed visible)
  const wMat=new THREE.MeshLambertMaterial({map:wallTex(),color:0xc8b060});
  // Floor: brownish carpet
  const fMat=new THREE.MeshLambertMaterial({map:floorTex(),color:0x8b7355});
  const cMat=new THREE.MeshLambertMaterial({map:ceilTex(),color:0xd4c89a});
  const baseMat=new THREE.MeshLambertMaterial({color:0x4a3515});
  maze=genMaze(MW,MH);
  // Floor (box for thickness)
  const flGeo=new THREE.BoxGeometry(MW*CELL,0.08,MH*CELL);
  const fl=new THREE.Mesh(flGeo,fMat);fl.position.set(MW*CELL/2,-0.04,MH*CELL/2);fl.receiveShadow=true;scene.add(fl);
  // Ceiling: individual tiles with frame + random missing
  const cFrameMat=new THREE.MeshStandardMaterial({color:0x2a2a20,roughness:1.0,metalness:0});
  const tileSize=1.125;const tilePad=0.04;
  for(let tz=0;tz<MH*CELL;tz+=tileSize){for(let tx=0;tx<MW*CELL;tx+=tileSize){
    if(Math.random()<0.05)continue;// missing tile
    const tile=new THREE.Mesh(new THREE.BoxGeometry(tileSize-tilePad,0.02,tileSize-tilePad),cMat);
    tile.position.set(tx+tileSize/2,WALL_H-0.01,tz+tileSize/2);tile.receiveShadow=true;scene.add(tile);
  }}
  // Ceiling frame grid
  for(let tz=0;tz<=MH*CELL;tz+=tileSize){const fH=new THREE.Mesh(new THREE.BoxGeometry(MW*CELL,0.03,tilePad),cFrameMat);fH.position.set(MW*CELL/2,WALL_H,tz);scene.add(fH)}
  for(let tx=0;tx<=MW*CELL;tx+=tileSize){const fV=new THREE.Mesh(new THREE.BoxGeometry(tilePad,0.03,MH*CELL),cFrameMat);fV.position.set(tx,WALL_H,MH*CELL/2);scene.add(fV)}
  // Ceiling backing
  const ceGeo=new THREE.BoxGeometry(MW*CELL,0.2,MH*CELL);
  const ce=new THREE.Mesh(ceGeo,cMat);ce.position.set(MW*CELL/2,WALL_H+0.1,MH*CELL/2);ce.receiveShadow=true;scene.add(ce);
  // Walls (box, only N+W per cell + boundary S+E)
  const wGeoH=new THREE.BoxGeometry(CELL,WALL_H,WALL_THICK);
  const wGeoV=new THREE.BoxGeometry(WALL_THICK,WALL_H,CELL);
  const bGeoH=new THREE.BoxGeometry(CELL,0.1,0.05);
  const bGeoV=new THREE.BoxGeometry(0.05,0.1,CELL);
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){
    const c=maze[y][x],cx2=x*CELL+CELL/2,cz=y*CELL+CELL/2;
    if(c.n){const w=new THREE.Mesh(wGeoH,wMat);w.position.set(cx2,WALL_H/2,y*CELL);w.castShadow=true;w.receiveShadow=true;if(Math.random()<0.03)w.rotation.y+=(Math.random()-0.5)*0.008;scene.add(w);const b=new THREE.Mesh(bGeoH,baseMat);b.position.set(cx2,0.05,y*CELL+WALL_THICK/2+0.025);scene.add(b);const b2=b.clone();b2.position.z=y*CELL-WALL_THICK/2-0.025;scene.add(b2)}
    if(c.w){const w=new THREE.Mesh(wGeoV,wMat);w.position.set(x*CELL,WALL_H/2,cz);w.castShadow=true;w.receiveShadow=true;scene.add(w);const b=new THREE.Mesh(bGeoV,baseMat);b.position.set(x*CELL+WALL_THICK/2+0.025,0.05,cz);scene.add(b);const b2=b.clone();b2.position.x=x*CELL-WALL_THICK/2-0.025;scene.add(b2)}
    if(y===MH-1&&c.s){const w=new THREE.Mesh(wGeoH,wMat);w.position.set(cx2,WALL_H/2,(y+1)*CELL);scene.add(w);const b=new THREE.Mesh(bGeoH,baseMat);b.position.set(cx2,0.05,(y+1)*CELL-WALL_THICK/2-0.025);scene.add(b)}
    if(x===MW-1&&c.e){const w=new THREE.Mesh(wGeoV,wMat);w.position.set((x+1)*CELL,WALL_H/2,cz);scene.add(w);const b=new THREE.Mesh(bGeoV,baseMat);b.position.set((x+1)*CELL-WALL_THICK/2-0.025,0.05,cz);scene.add(b)}
  }
  // Ambient: Level 0 bright uniform fluorescent
  scene.add(new THREE.AmbientLight(0xfff8e0,0.5));
  // Fluorescent tube lights (Level 0 style: long tubes recessed in ceiling)
  flickerLights=[];
  const tubeGeo=new THREE.BoxGeometry(2.0,0.04,0.08);
  const recessGeo=new THREE.BoxGeometry(2.2,0.06,0.25);
  const recessMat=new THREE.MeshStandardMaterial({color:0x1a1a15,roughness:1});
  for(let y=0;y<MH;y+=2)for(let x=0;x<MW;x+=2){if(Math.random()<0.05)continue;// barely any missing
    const lx=x*CELL+CELL/2,lz=y*CELL+CELL/2;
    const isBroken=Math.random()<0.02;
    const isDim=Math.random()<0.05;
    const baseI=isBroken?0:isDim?2.0:4.0;
    const flickRate=isBroken?0:isDim?0.025:0.005+Math.random()*0.008;
    // Recess in ceiling
    const recess=new THREE.Mesh(recessGeo,recessMat);recess.position.set(lx,WALL_H+0.02,lz);scene.add(recess);
    // Tube (emissive when on)
    const tubeColor=isBroken?0x333320:0xfff8e0;
    const tubeMat=new THREE.MeshBasicMaterial({color:tubeColor,transparent:true,opacity:isBroken?0.2:0.95});
    const tube=new THREE.Mesh(tubeGeo,tubeMat);tube.position.set(lx,WALL_H-0.01,lz);scene.add(tube);
    // Light (yellow-green tint like real fluorescent)
    const lightColor=0xfff4e0;// uniform warm white
    const pl=new THREE.PointLight(lightColor,baseI,CELL*4,1.5);pl.position.set(lx,WALL_H-0.08,lz);scene.add(pl);
    flickerLights.push({light:pl,tube,base:baseI,rate:flickRate,broken:isBroken});
  }
  // Exit: embedded dark panel in random wall (MC ant-block style)
  // Pick random wall cell that has a wall, embed exit there
  const exitCells=[];
  for(let y=2;y<MH-2;y++)for(let x=2;x<MW-2;x++){
    if(maze[y][x].n)exitCells.push({x,y,dir:'n'});
    if(maze[y][x].w)exitCells.push({x,y,dir:'w'});
  }
  const exitCell=exitCells[Math.floor(Math.random()*exitCells.length)];
  let ex,ez,eRotY;
  if(exitCell.dir==='n'){ex=exitCell.x*CELL+CELL/2;ez=exitCell.y*CELL;eRotY=0;}
  else{ex=exitCell.x*CELL;ez=exitCell.y*CELL+CELL/2;eRotY=Math.PI/2;}
  exitPos={x:ex,z:ez};
  // Dark panel embedded in wall - subtle color difference from wallpaper
  const exitMat=new THREE.MeshStandardMaterial({color:0x1a1510,roughness:0.95,metalness:0.05});
  const exitPanel=new THREE.Mesh(new THREE.BoxGeometry(0.9,2.0,0.06),exitMat);
  exitPanel.position.set(ex,1.0,ez);exitPanel.rotation.y=eRotY;scene.add(exitPanel);
  // No sign, no obvious light - just a slightly off-color panel
  // Wall corner shadow strips (AO fake)
  const shadowMat=new THREE.MeshBasicMaterial({color:0x0a0804,transparent:true,opacity:0.25});
  const shGeoH=new THREE.BoxGeometry(CELL,0.4,0.06);
  const shGeoV=new THREE.BoxGeometry(0.06,0.4,CELL);
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){
    const c=maze[y][x],cx3=x*CELL+CELL/2,cz3=y*CELL+CELL/2;
    if(c.n){const sh=new THREE.Mesh(shGeoH,shadowMat);sh.position.set(cx3,0.2,y*CELL+0.08);scene.add(sh)}
    if(c.w){const sh=new THREE.Mesh(shGeoV,shadowMat);sh.position.set(x*CELL+0.08,0.2,cz3);scene.add(sh)}
  }
  // Pillars at intersections
  const pillarGeo=new THREE.BoxGeometry(0.3,WALL_H,0.3);
  const pillarMat=new THREE.MeshStandardMaterial({color:0x7a6a40,roughness:1.0,metalness:0.0});
  for(let y=0;y<MH;y+=3)for(let x=0;x<MW;x+=3){
    if(maze[y][x].n&&maze[y][x].w){
      const p=new THREE.Mesh(pillarGeo,pillarMat);p.position.set(x*CELL,WALL_H/2,y*CELL);p.castShadow=true;p.receiveShadow=true;scene.add(p);
    }
  }
  playerPos={x:CELL/2,z:CELL/2};
}

// ─── Entity ───
function spawnEntity(){
  let ex,ez;for(let i=0;i<50;i++){ex=Math.floor(Math.random()*MW)*CELL+CELL/2;ez=Math.floor(Math.random()*MH)*CELL+CELL/2;if(Math.hypot(ex-playerPos.x,ez-playerPos.z)>CELL*10)break}
  const group=new THREE.Group();const bMat=new THREE.MeshStandardMaterial({color:0x080808,roughness:1});
  const torso=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.05,1.3,6),bMat);torso.position.y=1.0;group.add(torso);
  const head=new THREE.Group();head.position.y=1.85;
  for(let i=0;i<10;i++){const s=new THREE.Mesh(new THREE.SphereGeometry(0.06+Math.random()*0.07,4,4),bMat);s.position.set((Math.random()-0.5)*0.18,(Math.random()-0.5)*0.14,(Math.random()-0.5)*0.14);head.add(s)}
  const eye=new THREE.Mesh(new THREE.SphereGeometry(0.025,6,6),new THREE.MeshBasicMaterial({color:0xff1100}));eye.position.set(0.04,0,0.1);head.add(eye);
  const eyeL=new THREE.PointLight(0xff0000,0.25,1.2);eyeL.position.copy(eye.position);head.add(eyeL);group.add(head);
  const armGeo=new THREE.CylinderGeometry(0.018,0.012,0.9,4);
  const lArm=new THREE.Mesh(armGeo,bMat);lArm.position.set(-0.12,1.45,0);lArm.rotation.z=0.9;lArm.rotation.x=-0.3;group.add(lArm);
  const rArm=new THREE.Mesh(armGeo,bMat);rArm.position.set(0.12,1.05,0);rArm.rotation.z=-0.5;rArm.rotation.x=0.15;group.add(rArm);
  for(let i=0;i<4;i++){const cl=new THREE.Mesh(new THREE.CylinderGeometry(0.006,0.002,0.13,3),bMat);cl.position.set(-0.48+i*0.03,1.75,-0.08+i*0.02);cl.rotation.z=0.5+i*0.2;cl.rotation.x=-0.5;group.add(cl)}
  for(let i=0;i<3;i++){const cl=new THREE.Mesh(new THREE.CylinderGeometry(0.006,0.002,0.1,3),bMat);cl.position.set(0.32+i*0.02,0.68,0.04);cl.rotation.z=-0.3-i*0.15;group.add(cl)}
  const legGeo=new THREE.CylinderGeometry(0.022,0.018,1.0,4);
  const lL=new THREE.Mesh(legGeo,bMat);lL.position.set(-0.06,0.35,0);group.add(lL);
  const rL=new THREE.Mesh(legGeo,bMat);rL.position.set(0.06,0.38,0);group.add(rL);
  group.position.set(ex,0,ez);scene.add(group);
  entities.push({group,head,lArm,rArm,x:ex,z:ez,speed:1.4+Math.random()*0.5,pathTimer:0,target:null});
}

// ─── Collision (all 4 walls, thickness-aware) ───
function canMove(nx,nz,r){
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    const cx=Math.floor(nx/CELL)+dx,cz=Math.floor(nz/CELL)+dy;
    if(cx<0||cx>=MW||cz<0||cz>=MH)continue;
    const c=maze[cz][cx],wx=cx*CELL,wz=cz*CELL;const ht=WALL_THICK/2+0.01;
    if(c.n&&nz-r<wz+ht&&nz+r>wz-ht&&nx+r>wx&&nx-r<wx+CELL)return false;
    if(c.s&&nz+r>(cz+1)*CELL-ht&&nz-r<(cz+1)*CELL+ht&&nx+r>wx&&nx-r<wx+CELL)return false;
    if(c.w&&nx-r<wx+ht&&nx+r>wx-ht&&nz+r>wz&&nz-r<wz+CELL)return false;
    if(c.e&&nx+r>(cx+1)*CELL-ht&&nx-r<(cx+1)*CELL+ht&&nz+r>wz&&nz-r<wz+CELL)return false;
  }
  if(nx-r<0||nx+r>MW*CELL||nz-r<0||nz+r>MH*CELL)return false;return true;
}

// ─── Entity AI (BFS) ───
function moveEnt(e,dt){
  const dist=Math.hypot(playerPos.x-e.x,playerPos.z-e.z);if(dist<0.4){dead=true;return}
  e.pathTimer-=dt;if(e.pathTimer<=0||!e.target){e.pathTimer=0.4;e.target=bfsNext(e.x,e.z,playerPos.x,playerPos.z)||{x:playerPos.x,z:playerPos.z}}
  const dx=e.target.x-e.x,dz=e.target.z-e.z,d=Math.hypot(dx,dz);if(d<0.2){e.pathTimer=0;return}
  const a=Math.atan2(dz,dx),s=e.speed*dt;let nx=e.x+Math.cos(a)*s,nz=e.z+Math.sin(a)*s;
  if(canMove(nx,nz,0.18)){e.x=nx;e.z=nz}else if(canMove(nx,e.z,0.18))e.x=nx;else if(canMove(e.x,nz,0.18))e.z=nz;
  e.group.position.set(e.x,0,e.z);e.group.rotation.y=Math.atan2(-(playerPos.x-e.x),-(playerPos.z-e.z));
  const t=gameTime;e.head.rotation.z=Math.sin(t*2.5+e.speed)*0.18;e.head.rotation.x=Math.sin(t*1.8)*0.12+0.05;
  e.lArm.rotation.z=0.9+Math.sin(t*3.5)*0.25;e.rArm.rotation.z=-0.5+Math.sin(t*2.2)*0.18;
  e.group.position.y=Math.sin(t*4)*0.015;e.group.rotation.x=Math.sin(t*1.5)*0.03;e.group.rotation.z=Math.sin(t*2)*0.02;
}

// ─── Audio ───
let _ac=null;function ac(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();if(_ac.state==='suspended')_ac.resume();return _ac}
function hum(){try{const a=ac();
  // 60Hz fluorescent hum
  const o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.value=60;g.gain.value=0.02;o.connect(g);g.connect(a.destination);o.start();
  // 120Hz harmonic
  const o2=a.createOscillator(),g2=a.createGain();o2.type='sine';o2.frequency.value=120;g2.gain.value=0.008;o2.connect(g2);g2.connect(a.destination);o2.start();
  // HVAC low rumble
  const o3=a.createOscillator(),g3=a.createGain();o3.type='sawtooth';o3.frequency.value=28;g3.gain.value=0.006;o3.connect(g3);g3.connect(a.destination);o3.start();
  // Random ambient sounds loop
  setInterval(()=>{if(Math.random()<0.3){try{const a2=ac(),o4=a2.createOscillator(),g4=a2.createGain();
    const types=['sine','triangle','sawtooth'];o4.type=types[Math.floor(Math.random()*3)];
    o4.frequency.value=30+Math.random()*80;g4.gain.setValueAtTime(0.008+Math.random()*0.012,a2.currentTime);
    g4.gain.exponentialRampToValueAtTime(0.001,a2.currentTime+1+Math.random()*2);
    o4.connect(g4);g4.connect(a2.destination);o4.start();o4.stop(a2.currentTime+1+Math.random()*2)}catch(e){}}
  },4000+Math.random()*6000);
  }catch(e){}}
function step(){try{const a=ac(),b=a.createBufferSource(),buf=a.createBuffer(1,a.sampleRate*0.05,a.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()-0.5)*Math.exp(-i/(a.sampleRate*0.01))*0.2;b.buffer=buf;b.connect(a.destination);b.start()}catch(e){}}
function entSnd(){try{const a=ac(),o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.value=28+Math.random()*12;g.gain.setValueAtTime(0.04,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.4);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+0.4)}catch(e){}}

// ─── Post Processing ───
function setupPost(){composer=new THREE.EffectComposer(renderer);composer.addPass(new THREE.RenderPass(scene,camera));composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.15,0.2,0.96))}

// ─── Touch ───
function initJoy(){
  const lB=document.querySelector('#jl .jb'),lS=document.getElementById('jsl'),rb=document.getElementById('rb');const md=35;
  function ctr(b){const r=b.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}
  lB.addEventListener('touchstart',e=>{e.preventDefault();jlt=e.changedTouches[0].identifier;jlo=ctr(lB)},{passive:false});
  document.getElementById('c').addEventListener('touchstart',e=>{for(const t of e.changedTouches){if(t.clientX>innerWidth*0.35&&jlt!==t.identifier){lookTouchId=t.identifier;lookLastX=t.clientX;lookLastY=t.clientY}}},{passive:true});
  document.addEventListener('touchmove',e=>{for(const t of e.changedTouches){
    if(t.identifier===jlt&&jlo){let dx=t.clientX-jlo.x,dy=t.clientY-jlo.y;const d=Math.hypot(dx,dy);if(d>md){dx=dx/d*md;dy=dy/d*md}jlx=dx/md;jly=dy/md;lS.style.transform=`translate(calc(-50%+${dx}px),calc(-50%+${dy}px))`}
    if(t.identifier===lookTouchId){const dx=t.clientX-lookLastX,dy=t.clientY-lookLastY;yaw-=dx*0.005;pitch-=dy*0.003;pitch=Math.max(-1.2,Math.min(1.2,pitch));lookLastX=t.clientX;lookLastY=t.clientY}
  }},{passive:false});
  document.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===jlt){jlt=null;jlx=jly=0;lS.style.transform='translate(-50%,-50%)'}if(t.identifier===lookTouchId)lookTouchId=null}});
  rb.addEventListener('touchstart',e=>{e.preventDefault();running=true;rb.classList.add('on')},{passive:false});
  rb.addEventListener('touchend',()=>{running=false;rb.classList.remove('on')});
}

// ─── Update ───
let stepT=0;
function update(dt){
  if(dead||won)return;gameTime+=dt;entityTimer+=dt;
  const fw=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw)),rt=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
  const spd=(running&&stamina>0)?RUN_SPD:MOVE_SPD;let moved=false,mx=0,mz=0;
  if(isMobile){if(Math.abs(jlx)>0.1||Math.abs(jly)>0.1){mx+=fw.x*(-jly)+rt.x*jlx;mz+=fw.z*(-jly)+rt.z*jlx;moved=true}}
  else{if(keys.KeyW||keys.ArrowUp){mx+=fw.x;mz+=fw.z;moved=true}if(keys.KeyS||keys.ArrowDown){mx-=fw.x;mz-=fw.z;moved=true}if(keys.KeyA||keys.ArrowLeft){mx-=rt.x;mz-=rt.z;moved=true}if(keys.KeyD||keys.ArrowRight){mx+=rt.x;mz+=rt.z;moved=true}}
  if(moved){const l=Math.hypot(mx,mz)||1;mx/=l;mz/=l;const nx=playerPos.x+mx*spd*dt,nz=playerPos.z+mz*spd*dt;if(canMove(nx,playerPos.z,0.25))playerPos.x=nx;if(canMove(playerPos.x,nz,0.25))playerPos.z=nz;stepT+=dt*(running?1.5:1);if(stepT>0.38){stepT=0;step()}}
  if(running&&moved)stamina=Math.max(0,stamina-18*dt);else stamina=Math.min(100,stamina+12*dt);
  document.getElementById('stf').style.width=stamina+'%';
  playerY=1.5+(moved?Math.sin(gameTime*(running?10:7))*(running?0.03:0.015):0);
  camera.position.set(playerPos.x,playerY,playerPos.z);camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;
  for(const fl of flickerLights){if(fl.broken)continue;if(Math.random()<fl.rate){const off=Math.random()<0.18;fl.light.intensity=off?0:fl.base*(0.4+Math.random()*0.8);fl.tube.material.opacity=off?0.15:0.7+Math.random()*0.3}}
  const spawnInterval=90+Math.random()*120;if(entityTimer>spawnInterval&&entities.length<2){spawnEntity();entityTimer=0;showMsg("……");entSnd()}
  for(const e of entities){moveEnt(e,dt);if(Math.hypot(e.x-playerPos.x,e.z-playerPos.z)<8&&Math.random()<0.005)entSnd()}
  // Random events
  if(Math.random()<0.0003&&!dead&&!won){
    const ev=Math.floor(Math.random()*4);
    if(ev===0){// All lights flicker off briefly
      for(const fl of flickerLights){fl.light.intensity=0;fl.tube.material.opacity=0.1}
      setTimeout(()=>{for(const fl of flickerLights)if(!fl.broken)fl.light.intensity=fl.base},Math.random()*3000+2000);
      showMsg("")}
    else if(ev===1){// Distant sound
      try{const a=ac(),o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.value=80+Math.random()*40;g.gain.setValueAtTime(0.02,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+2);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+2)}catch(e){}}
    else if(ev===2){showMsg("")}// nothing, just silence
    else{camera.rotation.z=0.005;setTimeout(()=>camera.rotation.z=0,800)}// slight tilt
  }
  let near=false;for(const e of entities)if(Math.hypot(e.x-playerPos.x,e.z-playerPos.z)<7)near=true;
  if(near){sanity=Math.max(0,sanity-5*dt);scene.fog.density=0.05+0.03*(1-sanity/30);camera.rotation.z=Math.sin(gameTime*2.5)*0.012*(1-sanity/50)}
  else{sanity=Math.min(100,sanity+1.5*dt);scene.fog.density=0.05;camera.rotation.z=0}
  document.getElementById('sf').style.width=sanity+'%';
  if(Math.hypot(playerPos.x-exitPos.x,playerPos.z-exitPos.z)<1.2&&!won){won=true;
    // TV static effect + white noise
    const staticCanvas=document.createElement('canvas');staticCanvas.style.cssText='position:fixed;inset:0;z-index:300;width:100%;height:100%';
    staticCanvas.width=320;staticCanvas.height=240;document.body.appendChild(staticCanvas);
    const sctx=staticCanvas.getContext('2d');
    // White noise audio
    try{const a=ac(),bufSize=a.sampleRate*2,buf=a.createBuffer(1,bufSize,a.sampleRate),data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++)data[i]=(Math.random()*2-1)*0.3;
    const noise=a.createBufferSource();noise.buffer=buf;noise.loop=true;noise.connect(a.destination);noise.start();}catch(e){}
    // Animate static
    let staticFrames=0;
    function drawStatic(){if(staticFrames>90){staticCanvas.remove();
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('overlay').innerHTML='<h1>逃离</h1><div class="sub">'+fmt(gameTime)+'</div><p style="color:#444;margin-top:14px">后室还有无数层</p><button onclick="location.reload()">再来</button>';return;}
      const imgData=sctx.createImageData(320,240);
      for(let i=0;i<imgData.data.length;i+=4){const v=Math.random()*255;imgData.data[i]=v;imgData.data[i+1]=v;imgData.data[i+2]=v;imgData.data[i+3]=255;}
      sctx.putImageData(imgData,0,0);staticFrames++;requestAnimationFrame(drawStatic);}
    drawStatic();}
  document.getElementById('tm').textContent=fmt(gameTime);
  if(dead){document.getElementById('death').style.display='flex';document.getElementById('hud').classList.remove('show')}
  // Minimap update
  drawMinimap();
}
function fmt(t){return String(Math.floor(t/60)).padStart(2,'0')+':'+String(Math.floor(t%60)).padStart(2,'0')}
function showMsg(t){const e=document.getElementById('msg');e.textContent=t;e.style.opacity='1';if(msgTO)clearTimeout(msgTO);msgTO=setTimeout(()=>e.style.opacity='0',2500)}

// ─── Init ───
function init3D(){
  camera=new THREE.PerspectiveCamera(72,innerWidth/innerHeight,0.1,60);
  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
  renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.2;
  renderer.shadowMap.enabled=false;
  renderer.outputEncoding=THREE.sRGBEncoding;
  clock=new THREE.Clock();buildScene();setupPost();
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight)});
  document.getElementById('c').addEventListener('click',()=>{if(started2&&!locked&&!isMobile)document.getElementById('c').requestPointerLock()});
  document.addEventListener('pointerlockchange',()=>locked=!!document.pointerLockElement);
  document.addEventListener('mousemove',e=>{if(!locked)return;yaw-=e.movementX*M_SENS;pitch-=e.movementY*M_SENS;pitch=Math.max(-1.3,Math.min(1.3,pitch))});
  document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='ShiftLeft'||e.code==='ShiftRight')running=true});
  document.addEventListener('keyup',e=>{keys[e.code]=false;if(e.code==='ShiftLeft'||e.code==='ShiftRight')running=false});
  document.getElementById('overlay').classList.remove('hidden');animate();
}
function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.05);if(started2)update(dt);composer.render()}

window.start=function(mode){
  const el=document.documentElement;
  if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{});
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hud').classList.add('show');
  document.getElementById('minimap').classList.add('show');
  started2=true;
  if(mode==='pc'){document.getElementById('c').requestPointerLock()}
  else{document.getElementById('jl').classList.add('show');document.getElementById('rb').classList.add('show');initJoy()}
  hum();showMsg("找到出口……");
};
init3D();
}
</script>
</body>
</html>
